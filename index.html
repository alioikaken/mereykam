<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Heart Love Animation</title>

<style>
body {
    margin: 0;
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.container {
    position: relative;
    width: 600px;
    height: 600px;
}

.text {
    position: absolute;
    color: #ff2e63;
    font-size: 14px;
    opacity: 0;
    transform: scale(0.5);
    animation: animate 4s linear infinite;
    text-shadow: 0 0 5px #ff2e63, 0 0 15px #ff2e63;
    white-space: nowrap;
}

@keyframes animate {
    0% {
        opacity: 0;
        transform: translateY(20px) scale(0.5);
    }
    30% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
    70% {
        opacity: 1;
        transform: translateY(0) scale(1.1);
    }
    100% {
        opacity: 0;
        transform: translateY(-20px) scale(0.5);
    }
}
</style>

</head>
<body>

<div class="container" id="heart"></div>

<!-- МУЗЫКА -->
<audio id="music" src="love.mp3" loop></audio>

<script>
const container = document.getElementById("heart");
const music = document.getElementById("music");

// запуск музыки (с обходом блокировки)
function playMusic() {
    music.play().catch(() => {
        console.log("Автоплей заблокирован, жди клика");
    });
}

// попытка автозапуска
window.addEventListener("load", playMusic);

// запуск при клике (гарантированно работает)
document.addEventListener("click", () => {
    music.play();
});

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t));
    return {x, y};
}

function createText(x, y) {
    const el = document.createElement("div");
    el.className = "text";
    el.innerText = "I love you";

    const scale = 15;

    el.style.left = 300 + x * scale + "px";
    el.style.top = 300 + y * scale + "px";

    el.style.animationDelay = Math.random() * 3 + "s";

    container.appendChild(el);

    setTimeout(() => el.remove(), 4000);
}

// плотность сердца
setInterval(() => {
    for (let i = 0; i < 20; i++) {
        let t = Math.random() * Math.PI * 2;
        let pos = heart(t);
        createText(pos.x, pos.y);
    }
}, 200);
</script>

</body>
</html>
